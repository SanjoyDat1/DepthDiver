services:
  - type: web
    name: depthdiver-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free          # 512 MB RAM — depth engine fits comfortably
    autoDeploy: true

    envVars:
      # Largest input side in pixels — keep ≤ 512 to stay well under RAM limit
      - key: MAX_IMAGE_PX
        value: "512"

      # Only one job at a time (prevents concurrent OOM)
      - key: MAX_CONCURRENT_JOBS
        value: "1"

      # Job result TTL (seconds) — 30 minutes
      - key: JOB_TTL
        value: "1800"

      # Restrict thread count to stay memory-friendly
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
