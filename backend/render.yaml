# DepthDiver — Render.com deployment spec
# Docs: https://render.com/docs/render-yaml
#
# IMPORTANT: The free plan (512 MB) cannot run SHARP — it will OOM every time.
# Minimum viable plan: "standard" (2 GB RAM, $25/mo).
#
# To deploy:
#   1. Push repo to GitHub
#   2. Render Dashboard → New → Blueprint → connect repo
#   3. Render picks up this file automatically

services:
  - type: web
    name: depthdiver-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: standard          # ← REQUIRED: 2 GB RAM. Free (512 MB) will OOM.
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: SHARP_DEVICE
        value: cpu
      - key: SHARP_LOW_MEM
        value: "1"          # resize images to 768px max before SHARP → saves ~600 MB RAM
      - key: SHARP_TINY
        value: "0"          # set to "1" if still hitting OOM (reduces to 512px, lower quality)
      - key: MAX_IMAGE_PX
        value: "768"        # max longest-edge pixels sent to SHARP
      - key: SHARP_TIMEOUT
        value: "600"
      - key: JOB_TTL
        value: "1800"       # keep PLY files for 30 min
      - key: MAX_CONCURRENT_JOBS
        value: "1"          # never run two SHARP jobs at once (prevents double OOM)
      # Set to your Netlify URL to restrict CORS in production:
      # - key: ALLOWED_ORIGINS
      #   value: https://depthdiver.netlify.app
