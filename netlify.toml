# DepthDiver — Netlify configuration

[build]
  # Patches config.js with $BACKEND_URL if set, then serves public/
  command   = "[ -n \"$BACKEND_URL\" ] && sed -i.bak \"s|http://localhost:8000|$BACKEND_URL|g\" public/config.js && rm -f public/config.js.bak || true"
  publish   = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# ── Security headers ──────────────────────────────────────────────────────────
# NOTE: We do NOT set Cross-Origin-Embedder-Policy: require-corp because:
#   1. The 3D viewer uses sharedMemoryForWorkers:false, so SharedArrayBuffer
#      is not needed and COEP is unnecessary.
#   2. COEP: require-corp blocks ALL cross-origin fetches (to Render backend
#      and to jsdelivr CDN) unless those servers also set
#      Cross-Origin-Resource-Policy: cross-origin — which they don't.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.js"
  [headers.values]
    # no-cache: browser must revalidate on every visit (sends conditional GET).
    # Do NOT use "immutable" unless filenames include a content hash — immutable
    # prevents browsers from ever fetching an updated file at the same URL.
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

# ── SPA fallback ──────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
